name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: "**/go.sum"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
      - name: gofmt check
        run: test -z "$(gofmt -l .)"
      - name: go vet
        run: go vet ./...
      - name: unit tests
        run: go test ./...